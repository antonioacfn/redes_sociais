<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevLinks</title>
    <style>

        @keyframes color {
        0%   { background: #33CCCC; }
        20%  { background: #33CC36; }
        40%  { background: #B8CC33; }
        60%  { background: #FCCA00; }
        80%  { background: #33CC36; }
        100% { background: #33CCCC; }
        }

        body {

            background: #33CCCC; /* Fallback */
            animation: color 9s infinite ;
            background: linear-gradient(90deg, rgba(131, 58, 180, 1) 0%, rgba(29, 253, 160, 1) 50%, rgba(169, 55, 184, 1) 100%);
            display: grid;
            place-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        #container {
            width: 360px;
            height: 470px;
            background-color: #0555A6;
            border: 2px solid rgb(72, 63, 72);
            border-radius: 25px;
            text-align: center;
            padding-top: 20px;
        }

        h1 { color: white; font-family: sans-serif; }

        #but {
            position: relative; 
            border-radius: 25px;
            background: #03376A;
            height: 55px;
            width: 250px;
            margin: 29px auto;
            line-height: 55px;
            transition: 0.3s;
            z-index: 1;
        }

        #but:hover {
            background: #044586;
            transform: scale(1.05); 
        }

        #but::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(138, 43, 226, 0.6);
            border-radius: 25px;
            z-index: -1;
            opacity: 0;
        }

        #but:hover::after {
            animation: pulse 1000ms infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            display: block; 
        }

        #cir{
            background-image: url("https://media1.tenor.com/m/8KX0s2WLOFcAAAAC/cat-skeleton.gif");
            width: 55px;
            height: 59px;
            margin-left: auto;
            border-radius: 95px;
            margin-top: 25px;
            margin-right: auto;
            background-size: 59px 59px;
            background-repeat: no-repeat;
        }

        #ank{
            color: #f0f0f0;

        }

        #ank:hover {
            transition: 1s ease;
            transform: scale(1.2);
            color: rgb(203, 232, 18);
        }
    </style>
</head>
<body>
    <div id="container">
        <h1 id="ank">Ankeif</h1>
        <div id="cir">

        </div>
        <div id="but">
            <a href="https://instagram.com" target="_blank">INSTAGRAM</a>
        </div>
        <div id="but">
            <a href="https://toutube.com" target="_blank">YOUTUBE</a>
        </div>
        <div id="but">
            <a href="https://x.com" target="_blank">CARA</a>
        </div>


        
    </div>
</body>
</html>
